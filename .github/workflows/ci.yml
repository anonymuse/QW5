name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Zig 0.16.0 / Apple silicon
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Verify pinned toolchain
        run: test "$(zig version)" = "0.16.0"

      - name: Check formatting
        run: zig fmt --check build.zig src

      - name: Build
        run: zig build

      - name: Test
        run: zig build test

      - name: Smoke test
        run: zig build smoke

      - name: Inventory command and schema
        run: zig build run -- inventory | grep -F '"schema":"bootstrap-target-v1"'

      - name: Install contract validation dependencies
        run: |
          python3 -m venv .contract-venv
          .contract-venv/bin/python -m pip install --disable-pip-version-check -r requirements/contract-validation.txt

      - name: Validate contracts, semantics, and exact vectors
        run: .contract-venv/bin/python tools/validate_contracts.py
